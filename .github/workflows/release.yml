name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag or release version (for example v1.4.1)"
        required: true
        default: "v1.4.1"
      release_name:
        description: "Release title"
        required: true
        default: "Zapret Hub 1.4.1"
      changelog:
        description: "Release changelog"
        required: true

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $name = "${{ inputs.release_name }}"
            $bodyFile = Join-Path $env:RUNNER_TEMP "release_notes.md"
            @'
${{ inputs.changelog }}
'@ | Set-Content -Path $bodyFile -Encoding UTF8
          } else {
            $tag = "${{ github.ref_name }}"
            $version = $tag.TrimStart('v')
            $name = "Zapret Hub $version"
            $bodyFile = ".github/release-notes/$version.md"
            if (-not (Test-Path $bodyFile)) {
              throw "Release notes file not found: $bodyFile"
            }
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "body_file=$bodyFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build application
        shell: pwsh
        run: python -m PyInstaller -y .\packaging\zapret_hub.spec

      - name: Prepare payload
        shell: pwsh
        run: python .\_refresh_release.py

      - name: Build installer
        shell: pwsh
        run: python -m PyInstaller -y .\packaging\install_zaprethub.spec

      - name: Refresh release files
        shell: pwsh
        env:
          ZAPRET_HUB_RELEASE_UNIVERSAL: "1"
        run: python .\_refresh_release.py

      - name: SignPath placeholder
        shell: pwsh
        run: .\scripts\signpath_stub.ps1 -InputPath ".\dist\zapret_hub\zapret_hub.exe"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body_path: ${{ steps.release_meta.outputs.body_file }}
          files: |
            release_1.4.1/install_zaprethub_1.4.1_Universal.exe
            release_1.4.1/*.zip
